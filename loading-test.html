<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5F4F5" />
  <title>오늘도 과부하 | Loading Test</title>

  <!-- 한국어 UI 폰트: LINE Seed Sans KR -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@kfonts/line-seed-sans-kr/index.css" />

  <!-- 영어 손글씨 / YOU DIED 연출 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-normal: #F5F4F5;
      --bg-happy: #FAF8F2;
      --bg-dead: #141414;

      --ink: #151515;
      --ink-soft: #555;
      --yellow: #FFE566;
      --coffee: #6B3A2A;
      --red: #C0392B;

      --font-kr: "LINE Seed Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      --font-hand: "Caveat", cursive;
      --font-dead: "Cinzel", serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg-normal);
      font-family: var(--font-kr);
      color: var(--ink);
      overflow: hidden;
    }

    button {
      border: none;
      background: none;
      font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    img {
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* 전체 화면 */
    .loading-test {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-normal);
      transition: background 0.45s ease;
    }

    .loading-test.is-happy {
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.95) 0%, rgba(250, 248, 242, 1) 58%),
        var(--bg-happy);
    }

    .loading-test.is-normal {
      background: var(--bg-normal);
    }

    .loading-test.is-dead {
      background:
        radial-gradient(circle at center, rgba(70, 50, 45, 0.18) 0%, rgba(20, 20, 20, 0.96) 68%),
        var(--bg-dead);
      color: #111;
    }

    .test-inner {
      width: min(100%, 430px);
      min-height: 100svh;
      padding: 8vh 28px 7vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* 질문 문구 */
    .question {
      margin-bottom: 34px;
    }

    .question-en {
      font-family: var(--font-hand);
      font-size: 1.55rem;
      line-height: 1.25;
      letter-spacing: 0.02em;
      color: var(--ink);
    }

    .question-ko {
      margin-top: 10px;
      font-family: var(--font-kr);
      font-size: 0.93rem;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
    }

    /* 고양이 얼굴 */
    .cat-face-frame {
      width: 148px;
      height: 148px;
      margin-bottom: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 32px;
      transition:
        background 0.35s ease,
        box-shadow 0.35s ease,
        transform 0.35s ease;
    }

    .cat-face-frame.is-happy {
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 20px 50px rgba(255, 225, 160, 0.4);
    }

    .cat-face-frame.is-normal {
      background: rgba(255, 255, 255, 0.42);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.04);
    }

    .cat-face-frame.is-dead {
      background: rgba(0, 0, 0, 0.36);
      box-shadow: 0 0 60px rgba(192, 57, 43, 0.28);
    }

    .cat-face-frame.is-pop {
      animation: facePop 0.38s ease;
    }

    @keyframes facePop {
      0% { transform: scale(0.82); }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .cat-face {
      width: 132px;
      height: 132px;
      object-fit: contain;
    }

    /* 커피 컵 선택 */
    .coffee-controls {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 46px;
      margin-bottom: 10px;
    }

    .coffee-btn {
      width: 66px;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.14s ease, filter 0.14s ease;
    }

    .coffee-btn img {
      width: 58px;
      height: 68px;
      object-fit: contain;
      pointer-events: none;
    }

    .coffee-btn:hover {
      transform: translateY(-3px) scale(1.05);
      filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.12));
    }

    .coffee-btn:active {
      transform: scale(0.92);
    }

    /* 숫자 */
    .count-wrap {
      margin-bottom: 26px;
    }

    .count-number {
      font-size: 1.55rem;
      font-weight: 800;
      line-height: 1;
      color: var(--ink);
    }

    .count-unit {
      margin-left: 4px;
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--ink-soft);
    }

    .count-hint {
      margin-top: 5px;
      font-size: 0.72rem;
      color: #8a8a8a;
      letter-spacing: 0.04em;
    }

    /* DRINK 버튼 */
    .drink-btn {
      min-width: 154px;
      height: 56px;
      padding: 0 32px;
      border-radius: 15px;
      background: #111;
      color: var(--yellow);
      border: 2px solid #111;
      box-shadow: 4px 4px 0 var(--coffee);
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: 0.32em;
      transform: rotate(-1deg);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .drink-btn:hover {
      transform: rotate(1deg) scale(1.04);
      box-shadow: 6px 6px 0 var(--coffee);
    }

    .drink-btn:active {
      transform: scale(0.96);
      box-shadow: 2px 2px 0 var(--coffee);
    }

    /* 결과 문구 */
    .result-message {
      min-height: 32px;
      margin-top: 26px;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--ink);
    }

    .result-message.is-dead {
      color: rgba(255, 255, 255, 0.62);
    }

    .enter-btn {
      margin-top: 14px;
      padding: 10px 22px;
      border-radius: 12px;
      background: var(--yellow);
      border: 2px solid #111;
      color: #111;
      box-shadow: 3px 3px 0 #111;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      display: none;
    }

    .enter-btn.is-show {
      display: inline-flex;
    }

    /* YOU DIED */
    .you-died-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.82);
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.1s ease;
      cursor: pointer;
    }

    .you-died-overlay.is-show {
      opacity: 1;
      pointer-events: auto;
    }

    .you-died-text {
      font-family: var(--font-dead);
      font-size: clamp(3.2rem, 13vw, 6rem);
      font-weight: 700;
      letter-spacing: 0.17em;
      color: var(--red);
      text-shadow:
        0 0 28px rgba(192, 57, 43, 0.55),
        0 6px 14px rgba(0, 0, 0, 0.9);
      animation: diedAppear 1.7s ease both;
    }

    @keyframes diedAppear {
      0% {
        opacity: 0;
        letter-spacing: 0.4em;
        transform: scale(0.96);
      }
      100% {
        opacity: 1;
        letter-spacing: 0.17em;
        transform: scale(1);
      }
    }

    .you-died-sub {
      margin-top: 22px;
      font-family: var(--font-dead);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.55);
    }

    .you-died-ko {
      margin-top: 6px;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.42);
    }

    .tap-anywhere {
      position: absolute;
      bottom: 8vh;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      color: rgba(255, 255, 255, 0.36);
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 1; }
    }

    @media (max-width: 380px) {
      .question-en {
        font-size: 1.38rem;
      }

      .cat-face-frame {
        width: 132px;
        height: 132px;
      }

      .cat-face {
        width: 118px;
        height: 118px;
      }

      .coffee-controls {
        gap: 34px;
      }
    }
  </style>
</head>

<body>
  <main id="loadingTest" class="loading-test is-normal">
    <section class="test-inner">
      <div class="question">
        <p class="question-en">Hi? How much caffeine did you drink today?</p>
        <p class="question-ko">안녕? 오늘 카페인 얼마나 마셨어?</p>
      </div>

      <div id="catFaceFrame" class="cat-face-frame is-normal">
        <img id="catFace" class="cat-face" src="images/icons/cat_face_normal.png" alt="고양이 표정" />
      </div>

      <div class="coffee-controls">
        <button id="minusCup" class="coffee-btn" type="button" aria-label="커피 잔 수 줄이기">
          <img src="images/icons/coffee_empty.png" alt="빈 커피컵" />
        </button>

        <button id="plusCup" class="coffee-btn" type="button" aria-label="커피 잔 수 늘리기">
          <img src="images/icons/coffee_full.png" alt="가득 찬 커피컵" />
        </button>
      </div>

      <div class="count-wrap">
        <span id="cupCount" class="count-number">0</span>
        <span class="count-unit">잔</span>
        <p class="count-hint">왼쪽 컵은 덜 마심 · 오른쪽 컵은 더 마심</p>
      </div>

      <button id="drinkButton" class="drink-btn" type="button">DRINK</button>

      <p id="resultMessage" class="result-message"></p>

      <button id="enterButton" class="enter-btn" type="button">메인으로 들어가기 →</button>
    </section>
  </main>

  <div id="youDiedOverlay" class="you-died-overlay">
    <div class="you-died-text">YOU DIED</div>
    <div class="you-died-sub">TOO MUCH CAFFEINE...</div>
    <div class="you-died-ko">꽥꼬닥...</div>
    <div class="tap-anywhere">tap anywhere</div>
  </div>

  <script>
    const NEXT_PAGE = "memo-board.html";

    const FACE_IMAGES = {
      happy: "images/icons/cat_face_happy.png",
      normal: "images/icons/cat_face_normal.png",
      dead: "images/icons/cat_face_dead.png"
    };

    const OVERLOAD_THRESHOLD = 4;

    let cups = 0;
    let testFinished = false;

    const loadingTest = document.getElementById("loadingTest");
    const catFaceFrame = document.getElementById("catFaceFrame");
    const catFace = document.getElementById("catFace");
    const cupCount = document.getElementById("cupCount");
    const minusCup = document.getElementById("minusCup");
    const plusCup = document.getElementById("plusCup");
    const drinkButton = document.getElementById("drinkButton");
    const resultMessage = document.getElementById("resultMessage");
    const enterButton = document.getElementById("enterButton");
    const youDiedOverlay = document.getElementById("youDiedOverlay");

    function getState(count) {
      if (count >= OVERLOAD_THRESHOLD) return "dead";
      if (count <= 1) return "happy";
      return "normal";
    }

    function updateCount() {
      cupCount.textContent = cups;
    }

    function setVisualState(state) {
      loadingTest.classList.remove("is-happy", "is-normal", "is-dead");
      catFaceFrame.classList.remove("is-happy", "is-normal", "is-dead", "is-pop");
      resultMessage.classList.remove("is-dead");

      loadingTest.classList.add("is-" + state);
      catFaceFrame.classList.add("is-" + state);

      catFace.src = FACE_IMAGES[state];

      void catFaceFrame.offsetWidth;
      catFaceFrame.classList.add("is-pop");

      if (state === "dead") {
        resultMessage.classList.add("is-dead");
      }
    }

function saveResult(state) {
  const sessionId =
    "session_" +
    Date.now() +
    "_" +
    Math.random().toString(36).slice(2, 8);

  localStorage.setItem("caffeine_cups", String(cups));
  localStorage.setItem("caffeine_state", state);
  localStorage.setItem("caffeine_overloaded", state === "dead" ? "true" : "false");
  localStorage.setItem("caffeine_tested_at", new Date().toISOString());

  /* 이번 테스트 1회 고유 ID
     memo-board.html에서 이 ID를 기준으로 과카페인 묘 1개만 생성 */
  localStorage.setItem("caffeine_session_id", sessionId);
}

    function showResult() {
      const state = getState(cups);
      testFinished = true;

      setVisualState(state);
      saveResult(state);

      if (state === "happy") {
        resultMessage.textContent = "아직 괜찮은 상태야 ☕";
        enterButton.classList.add("is-show");
      }

      if (state === "normal") {
        resultMessage.textContent = "무뚝뚝한 직장인 모드...";
        enterButton.classList.add("is-show");
      }

      if (state === "dead") {
        resultMessage.textContent = "X _ X";
        setTimeout(() => {
          youDiedOverlay.classList.add("is-show");
        }, 500);
      }
    }

    function enterMain() {
      if (!testFinished) return;
      window.location.href = NEXT_PAGE;
    }

    minusCup.addEventListener("click", () => {
      if (cups > 0) {
        cups -= 1;
        updateCount();
      }
    });

    plusCup.addEventListener("click", () => {
      cups += 1;
      updateCount();
    });

    drinkButton.addEventListener("click", showResult);
    enterButton.addEventListener("click", enterMain);
    youDiedOverlay.addEventListener("click", enterMain);

    updateCount();
  </script>
</body>
</html>
